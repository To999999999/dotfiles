#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

cache = false

# [default_session]
# startup_command = "nvim -c ':Telescope find_files'"
# preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "tmuxconf"
path = "~/.config/tmux"
startup_command = "nvim ~/.config/tmux/tmux.conf"
preview_command = "cat ~/.config/tmux/tmux.conf"
windows = [ "sesh" ]

[[window]]
name = "sesh"
startup_script = "nvim ~/.config/sesh/sesh.toml"
