# Change the prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Activate the mouse
set -g mouse on

# Windows and panes start at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Set the good colors
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'

# Tmux modes to vim keybindings
setw -g mode-keys vi

# Bar settings
set -g status-position top

# Renumber windows when any is closed
set -g renumber-windows on

# Closing a session -> opens an available one
set -g detach-on-destroy off

# Bigger history limit
set -g history-limit 1000000

# Use system clipboard
set -g set-clipboard on

# Panes border colors
set -g pane-active-border-style 'fg=blue,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# Tmux doesn't wait when escape is pressed
set -sg escape-time 0

# New window from the working directory
# Match Ghostty:
#   Cmd+t -> new tab
#   prefix+t -> new tmux window
unbind c
unbind t
bind t new-window -c '#{pane_current_path}'

# Splits from the working directory
# Match Neovim:
#   <C-w> s -> horizontal split (top/bottom)
#   <C-w> v -> vertical split (left/right)
unbind '"'
unbind %
unbind s
unbind v

bind s split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'

# (sesh) "prefix T" -> opens a tmux session/project picker
bind-key T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# (sesh) "prefix L" -> go to the previous selected session
bind -N "last-session (via sesh)" L run-shell "sesh last"

# The tmux plugin manager (tpm)
set -g @plugin 'tmux-plugins/tpm'

# A nice light theme for the bar
set -g @plugin 'jeircul/tmux-themes'
set -g @tmux-statusline-theme 'ayu-light'

# Modern defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Ctrl+[h,j,k,l] to travel between panes
set -g @plugin 'christoomey/vim-tmux-navigator'

# To yank things with "y" into the clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Keep the sessions alive even after a reboot and continuously backed up
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tmux-continuum'

# Activate all plugins
run '~/.config/tmux/plugins/tpm/tpm'
